<div id="news-preview-wrapper">

    <div id="preview-header">
        ♟ Chess.com News
    </div>

    <div id="loading">
        Đang tải tin tức...
    </div>

    <div id="chess-news-widget"></div>

</div>

<style>
#news-preview-wrapper{
    width:360px;
    background:#111;
    border:1px solid #2f2f2f;
    border-radius:18px;
    padding:12px;
    font-family:Arial,sans-serif;
    box-shadow:0 0 18px rgba(0,0,0,.35);
}

#preview-header{
    color:white;
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
}

#loading{
    color:#aaa;
    text-align:center;
    padding:20px;
}

#chess-news-widget{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.news-card{
    display:flex;
    gap:10px;
    background:#1c1c1c;
    border:1px solid #333;
    border-radius:14px;
    overflow:hidden;
    padding:8px;
    transition:.2s;
    cursor:pointer;
    text-decoration:none;
}

.news-card:hover{
    transform:scale(1.02);
    background:#292929;
}

.news-thumb{
    width:115px;
    height:75px;
    object-fit:cover;
    border-radius:10px;
    flex-shrink:0;
}

.news-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
}

.news-title{
    color:white;
    font-size:14px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:5px;

    overflow:hidden;
    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:2;
}

.news-desc{
    color:#b0b0b0;
    font-size:12px;
    line-height:1.3;

    overflow:hidden;
    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:2;
}

.news-time{
    color:#7d7d7d;
    font-size:11px;
    margin-top:6px;
}
</style>

<script>
const container = document.getElementById("chess-news-widget");
const loading = document.getElementById("loading");

async function loadNews(){

    try{

        const rssUrl =
        "https://www.chess.com/news/rss";

        const api =
        "https://api.rss2json.com/v1/api.json?rss_url="
        + encodeURIComponent(rssUrl);

        const response = await fetch(api);
        const data = await response.json();

        loading.style.display = "none";
        container.innerHTML = "";

        data.items.slice(0,3).forEach(news => {

            let thumb = news.thumbnail;

            if(!thumb){
                thumb =
                "https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/PedroPinhata/phpx2LJvE.png";
            }

            const parser = document.createElement("div");
            parser.innerHTML = news.description;

            let preview =
            parser.textContent
            .replace(/\s+/g," ")
            .trim()
            .substring(0,100);

            if(preview.length >= 100){
                preview += "...";
            }

            const date =
            new Date(news.pubDate)
            .toLocaleString();

            container.innerHTML += `
            <a class="news-card"
               href="${news.link}"
               target="_blank">

                <img class="news-thumb"
                     src="${thumb}">

                <div class="news-info">

                    <div class="news-title">
                        ${news.title}
                    </div>

                    <div class="news-desc">
                        ${preview}
                    </div>

                    <div class="news-time">
                        ${date}
                    </div>

                </div>

            </a>
            `;
        });

    } catch(error){

        loading.innerHTML =
        "Không tải được news.";

        console.error(error);
    }
}

loadNews();

// auto update mỗi 5 phút
setInterval(loadNews,300000);
</script>
```
