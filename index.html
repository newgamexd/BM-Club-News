<div id="chess-news-widget"></div>

<style>
#chess-news-widget{
    width:340px;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.news-card{
    display:flex;
    gap:10px;
    background:#1f1f1f;
    border:1px solid #333;
    border-radius:14px;
    overflow:hidden;
    padding:8px;
    transition:.2s;
    cursor:pointer;
    text-decoration:none;
}

.news-card:hover{
    transform:scale(1.02);
    background:#2a2a2a;
}

.news-thumb{
    width:110px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
    flex-shrink:0;
}

.news-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.news-title{
    color:white;
    font-size:14px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:6px;
}

.news-time{
    color:#9aa0a6;
    font-size:12px;
}

.news-loading{
    color:white;
    text-align:center;
    padding:20px;
}
</style>

<div class="news-loading" id="loading">
Đang tải tin tức...
</div>

<script>
const container = document.getElementById("chess-news-widget");
const loading = document.getElementById("loading");

async function loadNews() {
    try {

        // Dùng RSS của Chess.com
        const rssUrl = "https://www.chess.com/news/rss";

        // Convert RSS -> JSON
        const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl);

        const response = await fetch(api);
        const data = await response.json();

        loading.style.display = "none";
        container.innerHTML = "";

        data.items.slice(0,3).forEach(news => {

            // thumbnail fallback
            let thumb = news.thumbnail;

            if(!thumb || thumb === ""){
                thumb = "https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/PedroPinhata/phpx2LJvE.png";
            }

            container.innerHTML += `
            <a class="news-card" href="${news.link}" target="_blank">
                <img class="news-thumb" src="${thumb}">
                <div class="news-info">
                    <div class="news-title">${news.title}</div>
                    <div class="news-time">
                        ${new Date(news.pubDate).toLocaleString()}
                    </div>
                </div>
            </a>
            `;
        });

    } catch(err){
        loading.innerHTML = "Không tải được news.";
        console.error(err);
    }
}

// load lần đầu
loadNews();

// tự cập nhật mỗi 5 phút
setInterval(loadNews, 300000);
</script>
```
